name: H4I-HipSOLVER Install

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build & install H4I-HipSOLVER (oneapi/2025.0.4)
        shell: bash
        run: |
          set -e
          if [ -f "$HOME/.local/init/bash" ]; then
            export MODULESHOME=$HOME/.local
            source "$MODULESHOME/init/bash"
          elif [ -f /etc/profile.d/lmod.sh ]; then
            source /etc/profile.d/lmod.sh
          else
            source /etc/profile.d/modules.sh
          fi
          module use /space/pvelesko/modulefiles
          module load oneapi/2025.0.4 llvm/22.0-native HIP/chipStar/main level-zero/dgpu HIP/H4I-MKLShim/oneapi-2025.0.4
          module list

          PREFIX=/home/pvelesko/install/HIP/H4I-HipSOLVER/oneapi-2025.0.4
          rm -rf build
          cmake -S . -B build \
            -DCMAKE_CXX_COMPILER="$(which hipcc)" \
            -DCLANG_COMPILER_PATH="$(which clang++)" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_TESTING=OFF \
            -DBUILD_SAMPLES=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build -j 8 --target install
